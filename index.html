    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

            min-height: 100vh;

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .music-btn { 
            position: fixed; 
            top: max(16px, env(safe-area-inset-top));
            right: max(16px, env(safe-area-inset-right));
            width: 52px; height: 52px; border-radius: 30px; 
            background: rgba(255,255,255,0.25); backdrop-filter: blur(15px); 
            border: 2px solid white; color: white; font-size: 26px; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; cursor: pointer;
        }
        .wrapper { 
            width: 100%; max-width: 480px; margin: 0 auto; 
            padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px; 
            min-height: 100vh; display: flex; align-items: center; 
        }
        .card { 
            width: 100%; background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); 
            border-radius: 48px; padding: 28px 20px; 
            border: 1px solid rgba(255,255,255,0.6); 
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.3);
        }
        .greeting { font-size: clamp(1.5rem,6vw,2rem); color: white; text-align: center; }
        .holiday-name { font-size: clamp(2rem,8vw,2.8rem); color: white; text-align: center; font-weight: 900; }
        .divider { height: 3px; background: linear-gradient(90deg, transparent, white, transparent); width: 70%; margin: 15px auto; }
        
        .progress {
            width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 20px;
            margin: 20px 0; overflow: hidden;
        }
        .progress-bar { height: 100%; background: white; width: 0%; transition: width 0.3s; border-radius: 20px; }
        
        .path-container { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        .path-card {
            background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 30px;
            padding: 20px; cursor: pointer; transition: all 0.2s;
        }
        .path-card:active { background: rgba(255,255,255,0.4); transform: scale(0.98); }
        .path-emoji { font-size: 2.5rem; text-align: center; }
        .path-title { font-size: 1.4rem; color: white; text-align: center; margin: 8px 0; }
        .path-desc { font-size: 1rem; color: rgba(255,255,255,0.8); text-align: center; }
        
        .question-text { 
            font-size: 1.6rem; color: white; text-align: center; 
            background: rgba(0,0,0,0.2); border-radius: 40px; padding: 20px;
            margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.3);
        }
        
        .inventory {
            background: rgba(0,0,0,0.3); border-radius: 30px; padding: 15px;
            margin: 15px 0; color: white; border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        
        .stats {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            margin: 15px 0;
        }
        .stat-badge {
            background: rgba(255,255,255,0.15); border-radius: 30px; padding: 8px 16px;
            color: white; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.3);
        }
        
        .action-button {
            width: 100%; background: rgba(255,255,255,0.25);
            border: 3px solid white; border-radius: 60px; padding: 18px;
            color: white; font-size: 1.3rem; margin: 15px 0; cursor: pointer;
            font-weight: 700; backdrop-filter: blur(10px);
        }
        .action-button:active { background: rgba(255,255,255,0.4); transform: scale(0.97); }
        
        .final-result { text-align: center; color: white; animation: fadeIn 0.6s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .final-emoji { font-size: 5rem; margin: 20px 0; }
        .final-title { font-size: 2.5rem; font-weight: 900; margin: 15px 0; }
        .final-desc { font-size: 1.2rem; margin: 20px 0; line-height: 1.5; }

                },

            };

            // Финальные типы для подсчёта
            const finals = {
                mind: { emoji: '🧠', title: 'МЫСЛИТЕЛЬ', desc: 'Твой интеллект - твоя суперсила!' },
                money: { emoji: '👑', title: 'ЛИДЕР', desc: 'Ты добился успеха и признания!' },
                travel: { emoji: '✈️', title: 'ПУТЕШЕСТВЕННИК', desc: 'Мир - твой дом, ты везде как рыба в воде!' },
                art: { emoji: '🎨', title: 'ТВОРЕЦ', desc: 'Ты создаёшь прекрасное и вдохновляешь других!' },
                care: { emoji: '❤️', title: 'ЗАБОТЛИВЫЙ', desc: 'Ты делаешь мир лучше, помогая другим!' },
                fun: { emoji: '🎉', title: 'ЗАЖИГАТЕЛЬ', desc: 'С тобой никогда не скучно, ты заражаешь радостью!' },
                calm: { emoji: '🧘', title: 'МУДРЕЦ', desc: 'Ты нашёл гармонию и внутренний покой!' },
                social: { emoji: '👥', title: 'ДУША КОМПАНИИ', desc: 'Тебя любят и ценят за умение дружить!' },
                love: { emoji: '💑', title: 'РОМАНТИК', desc: 'Ты умеешь любить и быть любимым!' },
                energy: { emoji: '⚡', title: 'ВЕЧНЫЙ ДВИГАТЕЛЬ', desc: 'Твоя энергия заражает всех вокруг!' }
            };

            let currentNode = 'start';
            let inventory = [];
            let scores = {
                mind:0, money:0, travel:0, art:0, care:0, 
                fun:0, calm:0, social:0, love:0, energy:0
            };
            
            let pathHistory = [];
            let stepCount = 0;
            const totalSteps = 20; // Для прогресс-бара

            function updateProgress() {
                let percent = (stepCount / totalSteps) * 100;
                if (percent > 100) percent = 100;
                progressBar.style.width = percent + '%';
            }

            function renderNode(nodeId) {
                let node = questTree[nodeId];
                if (!node) {
                    // Если узел не найден, показываем финал с накопленными баллами
                    showFinalResult();
                    return;
                }

                stepCount++;
                updateProgress();
                pathHistory.push(nodeId);

                // Если это финальный узел
                if (node.final) {
                    // Добавляем финальные очки
                    if (node.points) {
                        Object.keys(node.points).forEach(k => {
                            if (scores[k] !== undefined) scores[k] += node.points[k];
                        });
                    }
                    // Определяем тип финала
                    let finalType = node.type || Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                    showFinalResult(finalType, node.text);
                    return;
                }

                // Обычный узел с выбором
                let html = `
                    <div class="question-text">${node.text}</div>
                    <div class="inventory">
                        <strong>🎒 Инвентарь:</strong> ${inventory.length ? inventory.join(' · ') : 'пока пусто'}
                    </div>
                    <div class="stats">
                        ${Object.entries(scores).filter(([_, v]) => v > 0).map(([k, v]) => 
                            `<span class="stat-badge">${k}: ${v}</span>`
                        ).join('')}
                    </div>
                    <div class="path-container">
                `;

                node.paths.forEach(path => {
                    html += `
                        <div class="path-card" 
                             data-next="${path.next}" 
                             data-item="${path.item || ''}" 
                             data-points='${JSON.stringify(path.points || {})}'>
                            <div class="path-emoji">${path.title.split(' ')[0]}</div>
                            <div class="path-title">${path.title}</div>
                            <div class="path-desc">${path.desc}</div>
                        </div>
                    `;
                });

                html += `</div>`;
                
                // Кнопка "Начать заново" всегда доступна
                html += `<button class="action-button" id="restartBtn">🔄 Начать заново</button>`;
                
                gameArea.innerHTML = html;

                // Обработчики для карточек
                document.querySelectorAll('.path-card').forEach(card => {
                    card.addEventListener('click', function() {
                        let next = this.dataset.next;
                        let item = this.dataset.item;
                        let points = JSON.parse(this.dataset.points);

                        if (item) {
                            inventory.push(item);
                        }

                        Object.keys(points).forEach(k => {
                            if (scores[k] !== undefined) scores[k] += points[k];
                        });

                        if (next && questTree[next]) {
                            renderNode(next);
                        } else {
                            // Если следующего узла нет, показываем финал
                            showFinalResult();
                        }
                    });
                });

                // Кнопка рестарта
                document.getElementById('restartBtn').addEventListener('click', () => {
                    resetGame();
                });
            }

            function showFinalResult(specificType = null, finalText = null) {
                let maxType = specificType;
                if (!maxType) {
                    maxType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                }
                
                let f = finals[maxType] || finals.mind;
                
                // Подсчёт очков
                let totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
                
                // Топ-3 качества
                let topStats = Object.entries(scores)
                    .filter(([_, v]) => v > 0)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 3);

                let statsHtml = topStats.map(([k, v]) => 
                    `<span class="stat-badge">${k}: ${'⭐'.repeat(Math.min(5, Math.ceil(v/5)))}</span>`
                ).join(' ');

                gameArea.innerHTML = `
                    <div class="final-result">
                        <div class="final-emoji">${f.emoji}</div>
                        <div class="final-title">${f.title}</div>
                        <div class="final-desc">
                            ${finalText || f.desc}
                        </div>
                        
                        <div class="inventory">
                            <strong>🎒 Инвентарь:</strong><br>
                            ${inventory.join('<br>') || 'пусто'}
                        </div>
                        
                        <div class="stats" style="justify-content: center;">
                            ${statsHtml}
                        </div>
                        
                        <div style="margin: 20px 0; font-size: 1.1rem;">
                            ✨ Всего очков: ${totalScore}
                        </div>
                        
                        <div style="margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.15); border-radius: 30px;">
                            <div style="font-size: 1.3rem; margin-bottom: 10px;">📜 Твой путь:</div>
                            <div style="font-size: 0.9rem; opacity: 0.8;">
                                ${pathHistory.length} шагов к себе
                            </div>
                        </div>
                        
                        <button class="action-button" id="finalRestartBtn">🎓 Прожить заново</button>
                    </div>
                `;

                document.getElementById('finalRestartBtn').addEventListener('click', () => {
                    resetGame();
                });
            }

            function resetGame() {
                currentNode = 'start';
                inventory = [];
                scores = {
                    mind:0, money:0, travel:0, art:0, care:0, 
                    fun:0, calm:0, social:0, love:0, energy:0
                };
                pathHistory = [];
                stepCount = 0;
                progressBar.style.width = '0%';
                renderNode('start');
            }

            // Старт игры
            renderNode('start');

            // Автомузыка
            document.addEventListener('touchstart', () => { 
                if(music.paused) music.play().catch(()=>{}); 
            }, { once: true });
        })();
    </script>
