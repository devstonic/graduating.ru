        }

        .path-card {
            background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 30px;
            padding: 20px; cursor: pointer; transition: all 0.2s;

        .path-title { font-size: 1.4rem; color: white; text-align: center; margin: 8px 0; }
        .path-desc { font-size: 1rem; color: rgba(255,255,255,0.8); text-align: center; }

            background: rgba(0,0,0,0.3); border-radius: 30px; padding: 15px;

            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;

                    final: true,
                    text: "🎬 Твой фильм получил Оскар! Ты гений режиссуры, твой стиль узнаваем, а актёры считают за честь сниматься у тебя.",

                final_love_dating: {

                    stats: { любовь: 10, спокойствие: 7, романтика: 6, радость: 5 }
                },
                final_love_travel_together: {

                },
                final_love_family: {

                    type: 'забота',

                },
                
                final_family_care: {

                    type: 'дружба',
                    stats: { дружба: 8, деньги: 7, общение: 6, веселье: 5 }

                final_friends_world: {

                    type: 'путешествия',
                    stats: { путешествия: 10, дружба: 9, приключения: 8, веселье: 7 }
                },
                
                final_sport_champion: { 
                    final: true,
                    text: "🏆 Ты олимпийский чемпион! Золотая медаль, гимн страны, флаг над головой. Ты достиг вершин в спорте!",
                    type: 'успех',
                    stats: { успех: 10, сила: 9, амбиции: 8, энергия: 7 }
                },
                final_sport_captain: { 
                    final: true,
                    text: "👑 Ты капитан команды! Ты ведёшь за собой, вдохновляешь, поддерживаешь. Твоя команда - как семья!",
                    type: 'лидерство',
                    stats: { лидерство: 9, дружба: 8, общение: 7, успех: 6 }
                },
                final_sport_coach: { 
                    final: true,
                    text: "👨‍🏫 Ты стал тренером. Ты воспитал чемпионов, твои ученики тебя обожают, а ты получаешь радость от того, что даёшь другим!",
                    type: 'забота',
                    stats: { забота: 8, знания: 7, общение: 6, радость: 5 }
                }
            };

            // ==================== ФИНАЛЬНЫЕ ТИПЫ ====================
            const finals = {
                ум: { emoji: '🧠', title: 'МЫСЛИТЕЛЬ', desc: 'Твой интеллект - твоя суперсила! Ты видишь решения там, где другие видят проблемы.' },
                знания: { emoji: '📚', title: 'ЭРУДИТ', desc: 'Ты копил знания всю жизнь, и теперь они открывают любые двери!' },
                деньги: { emoji: '💰', title: 'МАГНАТ', desc: 'Ты умеешь зарабатывать и приумножать. Финансы текут к тебе рекой.' },
                успех: { emoji: '👑', title: 'ЛИДЕР', desc: 'Ты добился успеха и признания! Тобой восхищаются и тебя уважают.' },
                путешествия: { emoji: '✈️', title: 'ПУТЕШЕСТВЕННИК', desc: 'Мир - твой дом. Ты везде как рыба в воде и всегда открыт новому.' },
                приключения: { emoji: '🎢', title: 'АВАНТЮРИСТ', desc: 'Жизнь без риска - не жизнь. Ты всегда там, где интересно!' },
                творчество: { emoji: '🎨', title: 'ТВОРЕЦ', desc: 'Ты создаёшь прекрасное и вдохновляешь других своим талантом.' },
                искусство: { emoji: '🎭', title: 'АРТИСТ', desc: 'Ты живёшь искусством и даришь его людям. Ты - украшение мира.' },
                забота: { emoji: '❤️', title: 'ЗАБОТЛИВЫЙ', desc: 'Ты делаешь мир лучше, помогая другим. Твоё сердце полно тепла.' },
                помощь: { emoji: '🤝', title: 'ПОМОЩНИК', desc: 'На тебя всегда можно положиться. Ты первый придёшь на выручку.' },
                веселье: { emoji: '🎉', title: 'ЗАЖИГАТЕЛЬ', desc: 'С тобой никогда не скучно! Ты заражаешь всех своей радостью.' },
                радость: { emoji: '😊', title: 'ОПТИМИСТ', desc: 'Ты видишь хорошее во всём. Твой позитив заразителен!' },
                спокойствие: { emoji: '🧘', title: 'МУДРЕЦ', desc: 'Ты нашёл гармонию и внутренний покой. Ты - островок стабильности.' },
                гармония: { emoji: '☯️', title: 'ФИЛОСОФ', desc: 'Ты понимаешь баланс мира. Твоя мудрость помогает другим.' },
                общение: { emoji: '👥', title: 'КОММУНИКАТОР', desc: 'Ты умеешь находить общий язык с кем угодно. Ты - связующее звено.' },
                дружба: { emoji: '🤗', title: 'ДРУГ', desc: 'Тебя любят и ценят за умение дружить. Ты - надёжное плечо.' },
                любовь: { emoji: '💑', title: 'РОМАНТИК', desc: 'Ты умеешь любить и быть любимым. Твоё сердце всегда открыто.' },
                романтика: { emoji: '💕', title: 'МЕЧТАТЕЛЬ', desc: 'Ты веришь в настоящую любовь и создаёшь её вокруг себя.' },
                энергия: { emoji: '⚡', title: 'ВЕЧНЫЙ ДВИГАТЕЛЬ', desc: 'Твоя энергия заражает всех вокруг! Ты успеваешь всё и даже больше.' },
                сила: { emoji: '💪', title: 'СИЛАЧ', desc: 'Ты силён духом и телом. Никакие преграды тебя не остановят.' },
                лидерство: { emoji: '👑', title: 'ВОЖАК', desc: 'Ты рождён вести за собой. Люди идут за тобой.' },
                амбиции: { emoji: '🚀', title: 'ЧЕСТОЛЮБЕЦ', desc: 'Ты ставишь высокие цели и всегда их достигаешь. У тебя большое будущее.' }
            };

            let currentNode = 'start';
            let inventory = [];
            let scores = {
                ум: 0, знания: 0, деньги: 0, успех: 0,
                путешествия: 0, приключения: 0,
                творчество: 0, искусство: 0,
                забота: 0, помощь: 0,
                веселье: 0, радость: 0,
                спокойствие: 0, гармония: 0,
                общение: 0, дружба: 0,
                любовь: 0, романтика: 0,
                энергия: 0, сила: 0,
                лидерство: 0, амбиции: 0
            };
            
            let pathHistory = [];
            let stepCount = 0;
            const totalSteps = 20;

            function updateProgress() {
                let percent = (stepCount / totalSteps) * 100;
                if (percent > 100) percent = 100;
                progressBar.style.width = percent + '%';
            }

            function renderNode(nodeId) {
                let node = questTree[nodeId];
                if (!node) {
                    showFinalResult();
                    return;
                }

                stepCount++;
                updateProgress();
                pathHistory.push(nodeId);

                if (node.final) {
                    if (node.stats) {
                        Object.keys(node.stats).forEach(k => {
                            if (scores[k] !== undefined) scores[k] += node.stats[k];
                        });
                    }
                    let finalType = node.type || Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                    showFinalResult(finalType, node.text);
                    return;
                }

                let statsHtml = '';
                Object.entries(scores).forEach(([key, value]) => {
                    if (value > 0) {
                        statsHtml += `<span class="stat-badge">${stats[key]?.name || key}: ${value}</span>`;
                    }
                });

                let html = `
                    <div class="question-text">${node.text}</div>
                    <div class="inventory">
                        <strong>🎒 Инвентарь:</strong> ${inventory.length ? inventory.join(' · ') : 'пока пусто'}
                    </div>
                    <div class="stats">
                        ${statsHtml}
                    </div>
                    <div class="path-container">
                `;

                node.paths.forEach(path => {
                    html += `
                        <div class="path-card" 
                             data-next="${path.next}" 
                             data-item="${path.item || ''}" 
                             data-stats='${JSON.stringify(path.stats || {})}'>
                            <div class="path-emoji">${path.title.split(' ')[0]}</div>
                            <div class="path-title">${path.title}</div>
                            <div class="path-desc">${path.desc}</div>
                        </div>
                    `;
                });

                html += `</div><button class="action-button" id="restartBtn">🔄 Начать заново</button>`;
                gameArea.innerHTML = html;

                document.querySelectorAll('.path-card').forEach(card => {
                    card.addEventListener('click', function() {
                        let next = this.dataset.next;
                        let item = this.dataset.item;
                        let stats = JSON.parse(this.dataset.stats);

                        if (item) {
                            inventory.push(item);
                        }

                        Object.keys(stats).forEach(k => {
                            if (scores[k] !== undefined) scores[k] += stats[k];
                        });

                        if (next && questTree[next]) {
                            renderNode(next);
                        } else {
                            showFinalResult();
                        }
                    });
                });

                document.getElementById('restartBtn').addEventListener('click', resetGame);
            }

            function showFinalResult(specificType = null, finalText = null) {
                let maxType = specificType;
                if (!maxType) {
                    maxType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                }
                
                let f = finals[maxType] || finals.ум;
                
                let totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
                
                let topStats = Object.entries(scores)
                    .filter(([_, v]) => v > 0)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 3);

                let statsHtml = topStats.map(([k, v]) => 
                    `<span class="stat-badge">${finals[k]?.title || k}: ${'⭐'.repeat(Math.min(5, Math.ceil(v/5)))}</span>`
                ).join(' ');

                gameArea.innerHTML = `
                    <div class="final-result">
                        <div class="final-emoji">${f.emoji}</div>
                        <div class="final-title">${f.title}</div>
                        <div class="final-desc">
                            ${finalText || f.desc}
                        </div>
                        
                        <div class="inventory">
                            <strong>🎒 Инвентарь:</strong><br>
                            ${inventory.join('<br>') || 'пусто'}
                        </div>
                        
                        <div class="stats" style="justify-content: center;">
                            ${statsHtml}
                        </div>
                        
                        <div style="margin: 20px 0; font-size: 1.1rem;">
                            ✨ Всего очков: ${totalScore}
                        </div>
                        
                        <div style="margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.15); border-radius: 30px;">
                            <div style="font-size: 1.3rem; margin-bottom: 10px;">📜 Твой путь:</div>
                            <div style="font-size: 0.9rem; opacity: 0.8;">
                                ${pathHistory.length} шагов к себе
                            </div>
                        </div>
                        
                        <button class="action-button" id="finalRestartBtn">🎓 Прожить заново</button>
                    </div>
                `;

                document.getElementById('finalRestartBtn').addEventListener('click', resetGame);
            }

            function resetGame() {
                currentNode = 'start';
                inventory = [];
                scores = {
                    ум: 0, знания: 0, деньги: 0, успех: 0,
                    путешествия: 0, приключения: 0,
                    творчество: 0, искусство: 0,
                    забота: 0, помощь: 0,
                    веселье: 0, радость: 0,
                    спокойствие: 0, гармония: 0,
                    общение: 0, дружба: 0,
                    любовь: 0, романтика: 0,
                    энергия: 0, сила: 0,
                    лидерство: 0, амбиции: 0
                };
                pathHistory = [];
                stepCount = 0;
                progressBar.style.width = '0%';
                renderNode('start');
            }

            renderNode('start');

            document.addEventListener('touchstart', () => { 
                if(music.paused) music.play().catch(()=>{}); 
            }, { once: true });
        })();
    </script>
</body>
